slug: ci
repo: Clinico-AI-Lab/ci
title: REINF Madrid Feeder
description: >
  Excel-to-REINF feeder bot. Reads patient rows from an Excel sheet and
  fills the Registro de Infarto de Madrid web form via Playwright, with
  Basic/NTLM auth against the institutional SALUD network. Modify-only
  policy: never creates new records, only updates existing ones.
owner: Clinico-AI-Lab
status: active
tags: [python, playwright, automation, healthcare]
headline_metric:
  label: Open issues
  source: issues_count
created_at: 2026-05-22
links: []
todos:
  enabled: false        # flip to true once labels exist in the repo
  label_map:
    todo:        [todo, backlog]
    in_progress: [in-progress, "in progress", wip]
    done:        [done]
  ignore_labels: [duplicate, invalid, wontfix]
churn:
  enabled: true
  since_days: 365
  exclude_paths:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/__pycache__/**"
    - "**/.mypy_cache/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/*.lock"
    - "**/*.min.js"
    - "package-lock.json"
    - "uv.lock"
    - "poetry.lock"
    - "tests/fixtures/mocks/**"
